/* ════ TOPSTEPX CSV IMPORTER (verified against real fills) ════ */
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2) return [];
  const headers=lines[0].split(",");
  return lines.slice(1).map(line=>{
    const parts=[];let cur="",inQ=false;
    for(const ch of line){
      if(ch==='"'){inQ=!inQ;continue;}
      if(ch===','&&!inQ){parts.push(cur);cur="";}
      else cur+=ch;
    }
    parts.push(cur);
    const row={};headers.forEach((h,i)=>row[h.trim()]=(parts[i]??"").trim());
    return row;
  });
}
function _execPrice(r){const a=parseFloat(r.ExecutePrice),b=parseFloat(r.TriggeredPrice);return(!isNaN(a)&&a)?a:(!isNaN(b)?b:0);}
function _parseTime(r){const s=r.FilledAt||r.CreatedAt||"";const m=s.match(/(\d{2})\/(\d{2})\/(\d{4}) (\d{2}):(\d{2}):(\d{2})/);return m?new Date(+m[3],+m[1]-1,+m[2],+m[4],+m[5],+m[6]):new Date(0);}
function _mult(c){c=(c||"").toUpperCase();if(c.startsWith("MNQ"))return 2.0;if(c.startsWith("NQ"))return 20.0;if(c.startsWith("MES"))return 5.0;if(c.startsWith("ES"))return 50.0;return 2.0;}
function _instFrom(c){c=(c||"").toUpperCase();if(c.startsWith("MNQ")||c.startsWith("NQ"))return "NQ";if(c.startsWith("MES")||c.startsWith("ES"))return "ES";return "NQ";}
function reconstructTrades(rows){
  const dropped=rows.filter(r=>r.Status==="Cancelled"||r.Status==="Rejected");
  const fills=rows.filter(r=>r.Status==="Filled").map(r=>({
    t:_parseTime(r),px:_execPrice(r),signed:(r.Side==="Bid"?1:-1)*parseInt(r.Size||"0",10),
    disp:r.CreationDisposition,contract:r.ContractName
  })).sort((a,b)=>a.t-b.t);
  const trades=[];let legs=[];let open=null;
  const mult=fills.length?_mult(fills[0].contract):2.0;
  const startTrade=(f)=>({contract:f.contract,instrument:_instFrom(f.contract),
    dir:f.signed>0?"long":"short",entryTime:f.t,entries:[{px:f.px,sz:Math.abs(f.signed)}],
    exits:[],maxSize:Math.abs(f.signed),closeReason:null});
  for(const f of fills){
    let remaining=f.signed;
    while(remaining!==0&&legs.length&&(legs[0].sz>0)!==(remaining>0)){
      const leg=legs[0];const close=Math.min(Math.abs(leg.sz),Math.abs(remaining));
      const pnl=(leg.sz>0?(f.px-leg.px):(leg.px-f.px))*close*mult;
      if(open){open.exits.push({px:f.px,sz:close,pnl,reason:f.disp});open.closeReason=f.disp;}
      if(Math.abs(leg.sz)>close)leg.sz+=(leg.sz>0?-close:close);else legs.shift();
      remaining-=(remaining>0?close:-close);
      if(legs.length===0&&open){open.exitTime=f.t;open.pnl=open.exits.reduce((s,x)=>s+x.pnl,0);trades.push(open);open=null;}
    }
    if(remaining!==0){
      if(!open)open=startTrade({...f,signed:remaining});
      else{open.entries.push({px:f.px,sz:Math.abs(remaining)});open.maxSize=Math.max(open.maxSize,open.entries.reduce((s,e)=>s+e.sz,0));}
      legs.push({sz:remaining,px:f.px});
    }
  }
  let openTrade=null;
  if(open){const netOpen=legs.reduce((s,l)=>s+l.sz,0);
    const denom=legs.reduce((s,l)=>s+Math.abs(l.sz),0)||1;
    const avgPx=legs.reduce((s,l)=>s+l.px*Math.abs(l.sz),0)/denom;
    openTrade={...open,stillOpen:true,openContracts:netOpen,avgOpenPx:avgPx,pnl:open.exits.reduce((s,x)=>s+x.pnl,0)};}
  return {trades,openTrade,droppedCount:dropped.length,filledCount:fills.length,mult};
}
// Convert a reconstructed trade into a journal entry shell
function tradeToEntry(t){
  const e=blankEntry();
  e.id=t.entryTime.getTime()+Math.floor(Math.random()*1000);
  e.instrument=t.instrument;
  e.bias=t.dir;
  const avgEntry=t.entries.reduce((s,x)=>s+x.px*x.sz,0)/t.entries.reduce((s,x)=>s+x.sz,0);
  const avgExit=t.exits.length?t.exits.reduce((s,x)=>s+x.px*x.sz,0)/t.exits.reduce((s,x)=>s+x.sz,0):0;
  e.entry=avgEntry.toFixed(2);
  e.exitPrice=avgExit?avgExit.toFixed(2):"";
  e.size=String(t.maxSize);
  e.pnl=(t.pnl>=0?"+":"")+t.pnl.toFixed(2);
  e.outcome=t.pnl>0?"win":t.pnl<0?"loss":"be";
  const reasonMap={StopLoss:"Stopped out",TakeProfit:"Hit target",Trader:"Manual close",ClosePosition:"Manual close"};
  e.thesis=`Imported from TopstepX — ${t.dir.toUpperCase()} ${t.maxSize} ${t.contract}. Closed by ${reasonMap[t.closeReason]||t.closeReason||"—"}.`;
  e.imported=true;
  return e;
}

/* ════ AUTO BIAS INDICATOR ════
   Computes a directional read purely from entered TFC, opens, GEX regime,
   and battle-map level ownership — no manual sentiment input. Also factors in
   how much of the day's ATR is already used, since a stretched day changes
   the real probability of continuation vs exhaustion/reversal. */
function computeBias(e){
  let tfcScore=0,aboveCount=0,belowCount=0,bullTF=0,bearTF=0;
  TF_LIST.forEach(tf=>{
    const c=e.tfc[tf];
    if(c==="2u"){tfcScore+=2;bullTF++;}
    else if(c==="2d"){tfcScore-=2;bearTF++;}
    const o=e.opens[tf];
    if(o==="above"){tfcScore+=1;aboveCount++;}
    else if(o==="below"){tfcScore-=1;belowCount++;}
  });
  const levels=e.keyLevels||[];
  const buyerLv=levels.filter(l=>l.owner==="buyers"&&l.price).length;
  const sellerLv=levels.filter(l=>l.owner==="sellers"&&l.price).length;
  const levelScore=buyerLv-sellerLv;
  const raw=tfcScore+levelScore;
  const direction=raw>1?"LONG":raw<-1?"SHORT":"NEUTRAL";
  const mag=Math.abs(raw);

  // ATR-consumed: how much of today's expected range is already spent
  const atr=parseFloat(e.atrDaily),dOpen=parseFloat(e.dailyOpenPrice),spot=parseFloat(e.spotPrice);
  let atrUsedPct=null,atrExtended=false;
  if(atr&&dOpen&&spot){
    atrUsedPct=Math.round((Math.abs(spot-dOpen)/atr)*100);
    atrExtended=atrUsedPct>=80;
  }

  let confidence;
  if(e.gexRegime==="flip")confidence="LOW";
  else if(atrExtended)confidence="LOW";
  else if(mag>=7)confidence="HIGH";
  else if(mag>=3)confidence="MEDIUM";
  else confidence="LOW";

  const factors=[];
  factors.push(`${bullTF}↑ / ${bearTF}↓ of 5 timeframes`);
  factors.push(`Price above open on ${aboveCount}/5, below on ${belowCount}/5`);
  if(levels.length)factors.push(`${buyerLv} buyer-defended vs ${sellerLv} seller-defended level${levels.length!==1?"s":""}`);
  factors.push(gexData(e.gexRegime)?.l.split(" — ")[0]||"GEX not set");
  if(atrUsedPct!==null){
    factors.push(atrExtended
      ? `⚠ ${atrUsedPct}% of day's ATR already used — extension/reversal risk`
      : `${atrUsedPct}% of day's ATR used — room to run`);
  }
  return{direction,confidence,raw,factors,atrUsedPct,atrExtended};
}

/* ════ AUTO-GRADE ════
   Replaces manual A–F selection. Grades the trade on quality score, outcome,
   whether the manual bias agreed with the system's computed read, and the
   net of personalized discipline-habit answers. */
const ALL_HABIT_ITEMS=HABIT_CHECKS.flatMap(g=>g.items);
function computeAutoGrade(e){
  const q=qualityScore(e);
  const bias=computeBias(e);
  let answered=0,disciplinePts=0;
  ALL_HABIT_ITEMS.forEach(it=>{
    const v=e.habits?e.habits[it.k]:null;
    if(v===null||v===undefined)return;
    answered++;
    const goodBehavior=it.good?v===true:v===false;
    disciplinePts+=goodBehavior?1:-1;
  });
  const disciplineRatio=answered>0?disciplinePts/answered:0;
  const outcomeAdj=e.outcome==="win"?1.5:e.outcome==="be"?0:e.outcome==="loss"?-1:0;
  const biasMatches=bias.direction!=="NEUTRAL"&&((e.bias==="long"&&bias.direction==="LONG")||(e.bias==="short"&&bias.direction==="SHORT"));
  const biasAdj=bias.direction==="NEUTRAL"?0:(biasMatches?1:-1.5);
  const disciplineAdj=disciplineRatio*2;
  const score10=Math.max(0,Math.min(10,q*0.55+outcomeAdj+biasAdj+disciplineAdj));
  let letter,color;
  if(score10>=9){letter="A+";color=C.green;}
  else if(score10>=8){letter="A";color=C.green;}
  else if(score10>=6.5){letter="B";color=C.blue;}
  else if(score10>=5){letter="C";color=C.amber;}
  else if(score10>=3){letter="D";color=C.amber;}
  else{letter="F";color=C.red;}
  const why=[`Quality ${q}/10`];
  if(e.outcome&&e.outcome!=="open")why.push(e.outcome.toUpperCase());
  if(bias.direction!=="NEUTRAL")why.push(biasMatches?"bias matched system read":"bias fought system read");
  if(answered>0)why.push(`${Math.round((disciplinePts+answered)/2)}/${answered} disciplined habits`);
  return{letter,color,score10,why};
}
function gradeColor(g){
  if(g==="A+"||g==="A")return C.green;
  if(g==="B")return C.blue;
  if(g==="C")return C.amber;
  if(g==="D"||g==="F")return C.red;
  return C.dim;
}

function sizeCalc(entry,stop,risk,instrument){
  const en=parseFloat(entry),st=parseFloat(stop),rk=parseFloat(risk);
  if(!en||!st||!rk)return null;const stopPts=Math.abs(en-st);if(!stopPts)return null;
  const ptValue=instrument==="NQ"?0.50:instrument==="ES"?5:1;
  return{stopPts:stopPts.toFixed(1),contracts:(rk/(stopPts*ptValue)).toFixed(2),ptValue};}

/* ════ WATCHLIST + TRIGGERS + ALERTS ════ */
function WatchlistView({watch,onChange,onCheckAlerts}){
  const [spotInput,setSpotInput]=useState({});
  const add=()=>onChange([blankWatch(),...watch]);
  const rm=id=>onChange(watch.filter(w=>w.id!==id));
  const up=(id,f,v)=>onChange(watch.map(w=>w.id===id?{...w,[f]:v}:w));

  const triggerColor=t=>TRIGGER_TYPES.find(x=>x.v===t)?.color||C.amber;
  const triggerLabel=t=>TRIGGER_TYPES.find(x=>x.v===t)?.l||t;

  // Evaluate a live price against a watch trigger
  const evaluate=(w,spot)=>{
    const p=parseFloat(w.price),s=parseFloat(spot);
    if(!p||isNaN(s))return false;
    if(w.triggerType==="break_above"||w.triggerType==="reclaim")return s>=p;
    if(w.triggerType==="break_below")return s<=p;
    if(w.triggerType==="reject_at")return Math.abs(s-p)/p<0.0008; // within ~8bps
    return false;
  };

  const checkOne=(w)=>{
    const spot=spotInput[w.id];
    if(spot===undefined||spot==="")return;
    const hit=evaluate(w,spot);
    if(hit&&w.armed&&!w.fired){
      up(w.id,"fired",true);
      onChange(watch.map(x=>x.id===w.id?{...x,fired:true,firedAt:Date.now()}:x));
      // browser notification + vibration
      try{
        if("Notification" in window && Notification.permission==="granted"){
          new Notification("STRAT OS — Trigger Hit",{body:`${w.instrument} ${triggerLabel(w.triggerType)} ${w.price}${w.note?" · "+w.note:""}`});
        }
        if(navigator.vibrate)navigator.vibrate([120,60,120]);
      }catch(_){}
    }
  };

  return(<div style={{animation:"fadeUp 0.3s ease both"}}>
    <SectionHead n="◈" title="Watchlist & Triggers" sub="Mark levels and a trigger condition. Enter the live price to test; armed triggers fire an alert + notification."
      right={<button onClick={async()=>{try{if("Notification" in window){const p=await Notification.requestPermission();}}catch(_){}}}
        style={{background:"transparent",border:`1px solid ${C.border}`,color:C.dim,borderRadius:"6px",padding:"5px 10px",fontFamily:mono,fontSize:"9px",cursor:"pointer",letterSpacing:"0.06em"}}>🔔 ENABLE ALERTS</button>}/>

    <button onClick={add} style={{width:"100%",padding:"12px",background:"transparent",border:`1px dashed ${C.border}`,borderRadius:"9px",
      color:C.amber,fontFamily:mono,fontSize:"11px",letterSpacing:"0.1em",cursor:"pointer",marginBottom:16}}>+ ADD WATCH LEVEL</button>

    {watch.length===0?(
      <div style={{textAlign:"center",padding:"40px 20px",fontFamily:sans,fontSize:"12px",color:C.dim}}>
        No watch levels yet. Add the price levels you are stalking and how you want to be triggered.</div>
    ):(
      <div style={{display:"flex",flexDirection:"column",gap:11}}>
        {watch.map(w=>{const tc=triggerColor(w.triggerType);const ic=instColor(w.instrument);return(
          <div key={w.id} style={{background:C.panel,border:`1px solid ${w.fired?tc:C.border}`,borderLeft:`3px solid ${ic}`,
            borderRadius:"11px",padding:"14px",...(w.fired?{animation:"flash 1.5s ease infinite"}:{})}}>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:10}}>
              <select value={w.instrument} onChange={e=>up(w.id,"instrument",e.target.value)} style={{...sel(ic),width:80,fontSize:"12px",padding:"6px 9px",fontWeight:700}}>
                {INSTRUMENTS.map(i=><option key={i.id} value={i.id}>{i.id}</option>)}</select>
              <input placeholder="Level" value={w.price} onChange={e=>up(w.id,"price",e.target.value)} style={{...inp(tc),width:90,fontSize:"13px",padding:"6px 9px",fontWeight:700}}/>
              <select value={w.triggerType} onChange={e=>up(w.id,"triggerType",e.target.value)} style={{...sel(tc),width:140,fontSize:"11px",padding:"6px 9px"}}>
                {TRIGGER_TYPES.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}</select>
              <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
                <button onClick={()=>up(w.id,"armed",!w.armed)} style={{background:w.armed?`${C.green}1E`:"transparent",border:`1px solid ${w.armed?C.green:C.border}`,
                  color:w.armed?C.green:C.dim,borderRadius:"6px",padding:"5px 9px",fontFamily:mono,fontSize:"9px",cursor:"pointer",letterSpacing:"0.06em"}}>{w.armed?"ARMED":"OFF"}</button>
                <button onClick={()=>rm(w.id)} style={{background:"transparent",border:"none",color:C.dim,cursor:"pointer",fontSize:"12px"}}>✕</button></div>
            </div>
            <input placeholder="Note — why this level matters (PDH sweep, GEX call wall, OB…)" value={w.note} onChange={e=>up(w.id,"note",e.target.value)}
              style={{...inp(C.muted),fontFamily:sans,fontSize:"12px",marginBottom:10}}/>
            {/* live price test */}
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input placeholder="Live price…" value={spotInput[w.id]||""} onChange={e=>setSpotInput(p=>({...p,[w.id]:e.target.value}))}
                style={{...inp(),width:120,fontSize:"12px",padding:"7px 10px"}}/>
              <button onClick={()=>checkOne(w)} style={{background:`${tc}1A`,border:`1px solid ${tc}55`,color:tc,borderRadius:"7px",
                padding:"7px 14px",fontFamily:mono,fontSize:"11px",fontWeight:700,cursor:"pointer",letterSpacing:"0.06em"}}>CHECK</button>
              {w.fired&&(<span style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontFamily:mono,fontSize:"10px",fontWeight:700,color:tc}}>⚡ TRIGGERED</span>
                <button onClick={()=>{up(w.id,"fired",false);onChange(watch.map(x=>x.id===w.id?{...x,fired:false,firedAt:null}:x));}}
                  style={{background:"transparent",border:`1px solid ${C.border}`,color:C.dim,borderRadius:"5px",padding:"3px 8px",fontFamily:mono,fontSize:"9px",cursor:"pointer"}}>RESET</button></span>)}
            </div>
            <div style={{marginTop:8,fontFamily:sans,fontSize:"11px",color:C.muted,lineHeight:1.4}}>
              <span style={{fontFamily:mono,fontSize:"9px",color:`${tc}AA`,letterSpacing:"0.06em"}}>WHEN → </span>
              {w.triggerType==="break_above"?`Price breaks above ${w.price||"—"} → momentum long signal. Buyers in control.`
                :w.triggerType==="break_below"?`Price breaks below ${w.price||"—"} → momentum short signal. Sellers in control.`
                :w.triggerType==="reject_at"?`Price taps ${w.price||"—"} and rejects → fade / reversal setup forming.`
                :`Price reclaims ${w.price||"—"} after losing it → trap reversal, bias flips back.`}</div>
          </div>);})}
      </div>
    )}
    <div style={{marginTop:16,padding:"11px 13px",background:`${C.amber}0A`,border:`1px solid ${C.amber}22`,borderRadius:"9px",
      fontFamily:sans,fontSize:"11px",color:C.muted,lineHeight:1.6}}>
      <span style={{fontFamily:mono,fontSize:"9px",color:C.amber,letterSpacing:"0.08em"}}>NOTE · </span>
      This app evaluates triggers against the live price you enter (it has no live market feed). Tap CHECK after updating price, or paste prices in fast during the session. Enable alerts once to get a system notification + buzz when a trigger fires.</div>
  </div>);}

/* ════ WEEKLY REVIEW ════ */
function WeeklyReview({entries}){
  const [weekOffset,setWeekOffset]=useState(0); // 0 = current week
  const now=new Date();
  const targetDate=new Date(now.getTime()-weekOffset*7*86400000);
  const targetKey=weekKey(targetDate.getTime());
  const weekEntries=entries.filter(e=>weekKey(e.id)===targetKey);

  const closed=weekEntries.filter(e=>["win","loss","be"].includes(e.outcome));
  const wins=closed.filter(e=>e.outcome==="win");
  const losses=closed.filter(e=>e.outcome==="loss");
  const winRate=closed.length?Math.round((wins.length/closed.length)*100):0;
  const net=weekEntries.reduce((s,e)=>{const v=parseFloat(String(e.pnl).replace(/[^0-9.\-]/g,""));return s+(isNaN(v)?0:v);},0);
  const avgQuality=weekEntries.length?(weekEntries.reduce((s,e)=>s+qualityScore(e),0)/weekEntries.length).toFixed(1):"—";

  // Pattern mining: what do A-graded / wins share vs losses
  const tally=(arr,extract)=>{const m={};arr.forEach(e=>{const k=extract(e);if(k!=null)m[k]=(m[k]||0)+1;});return m;};
  const topOf=(m)=>{const k=Object.entries(m).sort((a,b)=>b[1]-a[1])[0];return k?`${k[0]} (${k[1]}×)`:"—";};

  const aGraded=weekEntries.filter(e=>e.grade==="A+"||e.grade==="A"||e.grade==="B");
  const fGraded=weekEntries.filter(e=>e.grade==="D"||e.grade==="F");

  const winGex=topOf(tally(wins,e=>e.gexRegime==="neg"?"−GEX":e.gexRegime==="pos"?"+GEX":"Flip"));
  const lossGex=topOf(tally(losses,e=>e.gexRegime==="neg"?"−GEX":e.gexRegime==="pos"?"+GEX":"Flip"));
  const winInst=topOf(tally(wins,e=>e.instrument));
  const lossInst=topOf(tally(losses,e=>e.instrument));
  const winBiasAgree=topOf(tally(wins,e=>{const b=computeBias(e);if(b.direction==="NEUTRAL")return null;return (e.bias==="long"&&b.direction==="LONG")||(e.bias==="short"&&b.direction==="SHORT")?"Bias matched system":"Bias fought system";}));
  const winDir=topOf(tally(wins,e=>e.bias==="long"?"LONG":"SHORT"));

  const avgWinQ=wins.length?(wins.reduce((s,e)=>s+qualityScore(e),0)/wins.length).toFixed(1):"—";
  const avgLossQ=losses.length?(losses.reduce((s,e)=>s+qualityScore(e),0)/losses.length).toFixed(1):"—";

  // deviation detection: trades taken with quality < 8
  const lowQTaken=weekEntries.filter(e=>qualityScore(e)<8 && ["win","loss","be"].includes(e.outcome));

  const stat=(label,value,color)=>(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"12px 10px",textAlign:"center"}}>
      <div style={{fontFamily:mono,fontWeight:700,fontSize:"19px",color}}>{value}</div>
      <div style={{fontFamily:mono,fontSize:"8px",color:C.dim,letterSpacing:"0.1em",marginTop:3}}>{label}</div></div>);

  const compareRow=(label,winVal,lossVal)=>(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,padding:"9px 0",borderBottom:`1px solid ${C.faint}`,alignItems:"center"}}>
      <span style={{fontFamily:mono,fontSize:"10px",color:C.dim,letterSpacing:"0.06em"}}>{label}</span>
      <span style={{fontFamily:sans,fontSize:"12px",color:C.green,fontWeight:600}}>{winVal}</span>
      <span style={{fontFamily:sans,fontSize:"12px",color:C.red,fontWeight:600}}>{lossVal}</span></div>);

  return(<div style={{animation:"fadeUp 0.3s ease both"}}>
    <SectionHead n="◈" title="Weekly Review" sub="What your winners share, where you bled, and whether you stuck to the system."
      right={<div style={{display:"flex",gap:6,alignItems:"center"}}>
        <button onClick={()=>setWeekOffset(o=>o+1)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:"6px",padding:"4px 9px",fontFamily:mono,fontSize:"11px",cursor:"pointer"}}>‹</button>
        <span style={{fontFamily:mono,fontSize:"10px",color:C.amber,minWidth:64,textAlign:"center"}}>{weekOffset===0?"THIS WK":targetKey}</span>
        <button onClick={()=>setWeekOffset(o=>Math.max(0,o-1))} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:"6px",padding:"4px 9px",fontFamily:mono,fontSize:"11px",cursor:"pointer"}}>›</button>
      </div>}/>

    {weekEntries.length===0?(
      <div style={{textAlign:"center",padding:"50px 20px",fontFamily:sans,fontSize:"12px",color:C.dim}}>
        No entries logged for this week. Use ‹ › to browse other weeks.</div>
    ):(<>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
        {stat("TRADES",weekEntries.length,C.blue)}
        {stat("WIN RATE",`${winRate}%`,winRate>=50?C.green:C.amber)}
        {stat("NET P&L",(net>=0?"+":"")+net.toFixed(1),net>=0?C.green:C.red)}
        {stat("AVG QUALITY",avgQuality,parseFloat(avgQuality)>=8?C.green:C.amber)}
      </div>

      {/* Winners vs Losers pattern table */}
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"16px",marginBottom:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:6}}>
          <span style={{fontFamily:mono,fontSize:"9px",color:C.dim,letterSpacing:"0.1em"}}>PATTERN</span>
          <span style={{fontFamily:mono,fontSize:"9px",color:C.green,letterSpacing:"0.1em"}}>WINNERS</span>
          <span style={{fontFamily:mono,fontSize:"9px",color:C.red,letterSpacing:"0.1em"}}>LOSERS</span></div>
        {compareRow("GEX regime",winGex,lossGex)}
        {compareRow("Instrument",winInst,lossInst)}
        {compareRow("Avg quality",avgWinQ,avgLossQ)}
        {compareRow("Bias agreement",winBiasAgree,"—")}
        {compareRow("Top direction",winDir,"—")}
      </div>

      {/* Edge insight */}
      <div style={{background:`${C.green}0A`,border:`1px solid ${C.green}33`,borderRadius:"12px",padding:"15px",marginBottom:14}}>
        <div style={{fontFamily:mono,fontSize:"9px",color:C.green,letterSpacing:"0.14em",marginBottom:8}}>◈ YOUR EDGE THIS WEEK</div>
        <div style={{fontFamily:sans,fontSize:"13px",color:C.textDim,lineHeight:1.6}}>
          {wins.length>0?(<>Your winners clustered in <b style={{color:C.green}}>{winGex}</b> environments
            {winInst!=="—"&&<> on <b style={{color:C.green}}>{winInst.split(" ")[0]}</b></>}, mostly <b style={{color:C.green}}>{winDir.split(" ")[0]}</b>.
            Average winning-setup quality was <b style={{color:C.green}}>{avgWinQ}/10</b>. Do more of this.</>)
            :"No winning trades logged yet this week. Focus on A+ setups only."}</div>
      </div>

      {/* Discipline check */}
      <div style={{background:lowQTaken.length>0?`${C.red}0A`:`${C.green}0A`,border:`1px solid ${lowQTaken.length>0?C.red:C.green}33`,borderRadius:"12px",padding:"15px",marginBottom:14}}>
        <div style={{fontFamily:mono,fontSize:"9px",color:lowQTaken.length>0?C.red:C.green,letterSpacing:"0.14em",marginBottom:8}}>◈ DISCIPLINE CHECK</div>
        <div style={{fontFamily:sans,fontSize:"13px",color:C.textDim,lineHeight:1.6}}>
          {lowQTaken.length>0?(<>You took <b style={{color:C.red}}>{lowQTaken.length}</b> trade{lowQTaken.length>1?"s":""} with a quality score below 8 (your "TAKE IT" threshold).
            {avgLossQ!=="—"&&parseFloat(avgLossQ)<parseFloat(avgWinQ)&&<> Your losers averaged <b style={{color:C.red}}>{avgLossQ}/10</b> vs winners at <b style={{color:C.green}}>{avgWinQ}/10</b> — the score is telling you the truth.</>}
            {" "}These are the trades to cut.</>)
            :<>Every closed trade this week met your quality threshold of 8+. <b style={{color:C.green}}>Clean discipline.</b> Protect this.</>}</div>
      </div>

      {/* Reflections roll-up */}
      <div style={{marginBottom:8}}>
        <div style={{fontFamily:mono,fontSize:"9px",color:C.dim,letterSpacing:"0.12em",marginBottom:10}}>REFLECTIONS THIS WEEK</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {weekEntries.filter(e=>e.reflection).map(e=>(
            <div key={e.id} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:"9px",padding:"11px 13px"}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:5}}>
                <span style={{fontFamily:mono,fontSize:"11px",fontWeight:700,color:instColor(e.instrument)}}>{e.instrument}</span>

/* ════ JOURNAL CARD ════ */
function JournalCard({entry,onOpen,onDelete}){
  const ic=instColor(entry.instrument);
  const oc=OUTCOME.find(o=>o.v===entry.outcome)?.color||C.muted;
  const ol=OUTCOME.find(o=>o.v===entry.outcome)?.l||"";
  const dirColor=entry.bias==="long"?C.green:C.red;const score=qualityScore(entry);
  return(<div onClick={()=>onOpen(entry)} style={{background:C.panel,border:`1px solid ${C.border}`,borderLeft:`3px solid ${ic}`,borderRadius:"11px",padding:"15px 16px",cursor:"pointer"}}>
    <div style={{display:"flex",alignItems:"center",gap:9,flexWrap:"wrap"}}>
      <span style={{fontFamily:mono,fontWeight:700,fontSize:"15px",color:ic}}>{entry.instrument}</span>
      <span style={{fontFamily:mono,fontSize:"11px",fontWeight:700,color:dirColor}}>{entry.bias==="long"?"▲ LONG":"▼ SHORT"}</span>
      {entry.outcome&&entry.outcome!=="open"&&<span style={{fontFamily:mono,fontSize:"9px",background:`${oc}1E`,border:`1px solid ${oc}44`,color:oc,padding:"2px 7px",borderRadius:"4px"}}>{ol}</span>}
      {entry.pnl&&<span style={{fontFamily:mono,fontSize:"12px",fontWeight:700,color:entry.pnl.trim().startsWith("-")?C.red:C.green}}>{entry.pnl}</span>}
      <div style={{marginLeft:"auto",display:"flex",gap:9,alignItems:"center"}}>
        <span style={{fontFamily:mono,fontSize:"10px",color:scoreVerdict(score).color}}>Q{score}</span>
        {entry.grade&&<span style={{fontFamily:mono,fontSize:"11px",fontWeight:700,color:gradeColor(entry.grade)}}>{entry.grade}</span>}
        <span style={{fontFamily:mono,fontSize:"10px",color:C.dim}}>{fmtDate(entry.id)}</span>
        <button onClick={ev=>{ev.stopPropagation();onDelete(entry.id);}} style={{background:"transparent",border:"none",color:C.dim,cursor:"pointer",fontSize:"12px",padding:0}}>✕</button></div></div>
    <div style={{display:"flex",gap:10,marginTop:10,flexWrap:"wrap"}}>
      {TF_LIST.map(tf=>(<span key={tf} style={{display:"flex",gap:3,alignItems:"center"}}>
        <span style={{fontFamily:mono,fontSize:"9px",color:C.dim}}>{tf}</span>
        <span style={{fontFamily:mono,fontSize:"11px",fontWeight:700,color:tfcColor(entry.tfc[tf])}}>{tfcLabel(entry.tfc[tf])}</span></span>))}
      <span style={{marginLeft:"auto",fontFamily:mono,fontSize:"9px",color:gexData(entry.gexRegime)?.color}}>{entry.gexRegime==="neg"?"−GEX":entry.gexRegime==="pos"?"+GEX":"FLIP"}</span></div>
    {entry.thesis&&<p style={{fontFamily:sans,fontSize:"12px",color:C.muted,marginTop:9,lineHeight:1.5,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{entry.thesis}</p>}
  </div>);}

/* ════ STATS + DISCIPLINE ════ */
function StatsBar({entries}){
  const closed=entries.filter(e=>["win","loss","be"].includes(e.outcome));
  const wins=closed.filter(e=>e.outcome==="win").length;
  const winRate=closed.length?Math.round((wins/closed.length)*100):0;
  const net=entries.reduce((s,e)=>{const v=parseFloat(String(e.pnl).replace(/[^0-9.\-]/g,""));return s+(isNaN(v)?0:v);},0);
  const stats=[{label:"ENTRIES",value:entries.length,color:C.blue},{label:"CLOSED",value:closed.length,color:C.slate},
    {label:"WIN RATE",value:`${winRate}%`,color:winRate>=50?C.green:C.amber},{label:"NET P&L",value:(net>=0?"+":"")+net.toFixed(1),color:net>=0?C.green:C.red}];
  return(<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
    {stats.map(s=>(<div key={s.label} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"11px 8px",textAlign:"center"}}>
      <div style={{fontFamily:mono,fontWeight:700,fontSize:"18px",color:s.color}}>{s.value}</div>
      <div style={{fontFamily:mono,fontSize:"8px",color:C.dim,letterSpacing:"0.1em",marginTop:3}}>{s.label}</div></div>))}</div>);}
/* ════ CSV IMPORT VIEW ════ */
function ImportView({onImportTrades,onClose}){
  const [preview,setPreview]=useState(null);
  const [error,setError]=useState("");
  const [selected,setSelected]=useState({});
  const fileRef=useRef();

  const handleFile=(file)=>{
    setError("");
    const r=new FileReader();
    r.onload=()=>{
      try{
        const rows=parseCSV(r.result);
        if(!rows.length||!("Status" in rows[0])){setError("This does not look like a TopstepX orders export. Expected columns like Status, Side, Size, ExecutePrice.");return;}
        const result=reconstructTrades(rows);
        if(result.trades.length===0&&!result.openTrade){setError("No completed trades found. This file may contain only cancelled or working orders.");return;}
        const sel={};result.trades.forEach((_,i)=>{sel[i]=true;});
        setSelected(sel);
        setPreview(result);
      }catch(err){setError("Could not parse this file. "+err.message);}
    };
    r.readAsText(file);
  };

  const doImport=()=>{
    const chosen=preview.trades.filter((_,i)=>selected[i]).map(tradeToEntry);
    onImportTrades(chosen);
  };

  const totalSel=preview?preview.trades.filter((_,i)=>selected[i]).length:0;
  const totalPnl=preview?preview.trades.filter((_,i)=>selected[i]).reduce((a,t)=>a+t.pnl,0):0;
  const reasonMap={StopLoss:"Stopped out",TakeProfit:"Hit target",Trader:"Manual",ClosePosition:"Manual"};

  const Uploader=(
    <div>
      <div onClick={()=>{if(fileRef.current)fileRef.current.click();}} style={{border:"1px dashed "+C.border,borderRadius:"12px",padding:"40px 20px",textAlign:"center",cursor:"pointer",marginBottom:14}}>
        <div style={{fontSize:"28px",marginBottom:10}}>{"\u2191"}</div>
        <div style={{fontFamily:mono,fontSize:"13px",color:C.amber,letterSpacing:"0.08em",marginBottom:6}}>TAP TO SELECT CSV</div>
        <div style={{fontFamily:sans,fontSize:"11px",color:C.muted}}>orders_export.csv from TopstepX</div>
      </div>
      <input ref={fileRef} type="file" accept=".csv,text/csv" style={{display:"none"}} onChange={(ev)=>{const f=ev.target.files[0];if(f)handleFile(f);}}/>
    </div>
  );

  const Tradecard=(t,i)=>{
    const avgEntry=t.entries.reduce((a,x)=>a+x.px*x.sz,0)/t.entries.reduce((a,x)=>a+x.sz,0);
    const on=selected[i];
    const win=t.pnl>=0;
    const bc=win?C.green:C.red;
    return (
      <div key={i} onClick={()=>setSelected(p=>Object.assign({},p,{[i]:!p[i]}))} style={{background:C.panel,border:"1px solid "+(on?bc+"55":C.border),borderLeft:"3px solid "+bc,borderRadius:"10px",padding:"12px 14px",cursor:"pointer",opacity:on?1:0.45}}>
        <div style={{display:"flex",alignItems:"center",gap:9,flexWrap:"wrap"}}>
          <span style={{flexShrink:0,width:18,height:18,borderRadius:"5px",border:"1.5px solid "+(on?bc:C.dim),background:on?bc:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:mono,fontSize:"11px",color:"#0A0A0A",fontWeight:700}}>{on?"\u2713":""}</span>
          <span style={{fontFamily:mono,fontWeight:700,fontSize:"13px",color:instColor(t.instrument)}}>{t.instrument}</span>
          <span style={{fontFamily:mono,fontSize:"11px",fontWeight:700,color:t.dir==="long"?C.green:C.red}}>{(t.dir==="long"?"\u25B2 LONG ":"\u25BC SHORT ")+t.maxSize}</span>
          <span style={{fontFamily:mono,fontSize:"13px",fontWeight:700,color:bc,marginLeft:"auto"}}>{(win?"+":"")+t.pnl.toFixed(2)}</span>
        </div>
        <div style={{display:"flex",gap:12,marginTop:8,fontFamily:mono,fontSize:"10px",color:C.muted,flexWrap:"wrap"}}>
          <span>{"entry "+avgEntry.toFixed(2)}</span>
          <span>{t.entryTime.toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}</span>
          <span style={{color:t.closeReason==="StopLoss"?C.red:t.closeReason==="TakeProfit"?C.green:C.slate}}>{reasonMap[t.closeReason]||t.closeReason||"\u2014"}</span>
        </div>
      </div>
    );
  };

  return (
    <div style={{animation:"fadeUp 0.3s ease both"}}>
      <SectionHead n={"\u25C8"} title={"Import Trades \u2014 TopstepX CSV"} sub={"Upload your orders export. Cancelled and rejected orders are dropped automatically. Fills are reconstructed into round-trip trades with real P&L."}/>
      {!preview?Uploader:null}
      {error?(<div style={{background:C.red+"0C",border:"1px solid "+C.red+"44",borderRadius:"9px",padding:"12px 14px",marginBottom:14,fontFamily:sans,fontSize:"12px",color:C.red,lineHeight:1.5}}>{error}</div>):null}
      {preview?(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
            <div style={{background:C.panel,border:"1px solid "+C.border,borderRadius:"10px",padding:"11px 8px",textAlign:"center"}}>
              <div style={{fontFamily:mono,fontWeight:700,fontSize:"17px",color:C.green}}>{preview.trades.length}</div>
              <div style={{fontFamily:mono,fontSize:"8px",color:C.dim,letterSpacing:"0.08em",marginTop:3}}>TRADES</div>
            </div>
            <div style={{background:C.panel,border:"1px solid "+C.border,borderRadius:"10px",padding:"11px 8px",textAlign:"center"}}>
              <div style={{fontFamily:mono,fontWeight:700,fontSize:"17px",color:C.red}}>{preview.droppedCount}</div>
              <div style={{fontFamily:mono,fontSize:"8px",color:C.dim,letterSpacing:"0.08em",marginTop:3}}>DROPPED</div>
            </div>
            <div style={{background:C.panel,border:"1px solid "+C.border,borderRadius:"10px",padding:"11px 8px",textAlign:"center"}}>
              <div style={{fontFamily:mono,fontWeight:700,fontSize:"17px",color:totalPnl>=0?C.green:C.red}}>{(totalPnl>=0?"+":"")+totalPnl.toFixed(0)}</div>
              <div style={{fontFamily:mono,fontSize:"8px",color:C.dim,letterSpacing:"0.08em",marginTop:3}}>SEL. P&L</div>
            </div>
          </div>
          <div style={{fontFamily:mono,fontSize:"9px",color:C.dim,letterSpacing:"0.1em",marginBottom:8}}>{"REVIEW & SELECT \u2014 "+totalSel+" of "+preview.trades.length+" selected"}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
            {preview.trades.map((t,i)=>Tradecard(t,i))}
          </div>
          {preview.openTrade?(
            <div style={{background:C.blue+"0A",border:"1px solid "+C.blue+"33",borderRadius:"10px",padding:"12px 14px",marginBottom:14}}>
              <div style={{fontFamily:mono,fontSize:"9px",color:C.blue,letterSpacing:"0.1em",marginBottom:5}}>{"\u25C8 STILL OPEN \u2014 NOT IMPORTED"}</div>
              <div style={{fontFamily:sans,fontSize:"12px",color:C.muted,lineHeight:1.5}}>{(preview.openTrade.openContracts>0?"Long ":"Short ")+Math.abs(preview.openTrade.openContracts)+" @ "+preview.openTrade.avgOpenPx.toFixed(2)+" did not close in this file. Re-import the full session once it is flat to capture its P&L."}</div>
            </div>
          ):null}
          <div style={{background:C.amber+"0A",border:"1px solid "+C.amber+"22",borderRadius:"9px",padding:"11px 13px",marginBottom:16,fontFamily:sans,fontSize:"11px",color:C.muted,lineHeight:1.6}}>
            <span style={{fontFamily:mono,fontSize:"9px",color:C.amber}}>{"NOTE \u00B7 "}</span>
            {"Imported trades land in your journal pre-filled with instrument, direction, entry, exit, size, P&L, and outcome. Open each to add your TFC, GEX, thesis, and reflection."}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setPreview(null);setError("");}} style={{flex:"0 0 auto",padding:"13px 20px",background:"transparent",border:"1px solid "+C.border,borderRadius:"9px",color:C.muted,fontFamily:mono,fontSize:"12px",cursor:"pointer"}}>BACK</button>
            <button onClick={doImport} disabled={totalSel===0} style={{flex:1,padding:"13px",background:totalSel?"linear-gradient(135deg, "+C.amber+", "+C.amber+"CC)":C.faint,border:"none",borderRadius:"9px",color:totalSel?"#0A0A0A":C.dim,fontFamily:mono,fontWeight:700,fontSize:"12px",letterSpacing:"0.08em",cursor:totalSel?"pointer":"default"}}>{"\u25C8 IMPORT "+totalSel+" TRADE"+(totalSel!==1?"S":"")}</button>
          </div>
        </div>
      ):null}
    </div>
  );
}

      <button onClick={()=>onSave(s)} style={{flex:1,padding:"13px",background:`linear-gradient(135deg, ${C.amber}, ${C.amber}CC)`,border:"none",borderRadius:"9px",color:"#0A0A0A",fontFamily:mono,fontWeight:700,fontSize:"12px",letterSpacing:"0.1em",cursor:"pointer"}}>◈ SAVE SETTINGS</button></div>
  </div>);}

/* ════ MAIN APP ════ */
function StratOS(){
  const [tab,setTab]=useState("home");       // home | watch | review | settings
  const [view,setView]=useState("list");     // list | form  (within home)
  const [entries,setEntries]=useState([]);
  const [watch,setWatch]=useState([]);
  const [editing,setEditing]=useState(null);
  const [isEdit,setIsEdit]=useState(false);
  const [filter,setFilter]=useState("ALL");
  const [settings,setSettings]=useState(loadSettings());
  const [gex,setGex]=useState(loadGex());
  const [clock,setClock]=useState(new Date());
  const [toast,setToast]=useState("");

  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(t);},[]);
  useEffect(()=>{setEntries(loadEntries());setWatch(loadWatch());setGex(loadGex());},[]);
  const flash=m=>{setToast(m);setTimeout(()=>setToast(""),2200);};

  const startNew=()=>{setEditing(blankEntry());setIsEdit(false);setView("form");setTab("home");};
  const openEntry=e=>{setEditing(e);setIsEdit(true);setView("form");setTab("home");};
  const handleSave=e=>{const arr=[e,...entries.filter(x=>x.id!==e.id)].sort((a,b)=>b.id-a.id);setEntries(arr);saveEntries(arr);setView("list");setEditing(null);flash("Saved to journal");};
  const handleDelete=id=>{const arr=entries.filter(e=>e.id!==id);setEntries(arr);saveEntries(arr);};
  const handleWatch=arr=>{setWatch(arr);saveWatch(arr);};
  const handleSettings=s=>{setSettings(s);saveSettings(s);setTab("home");flash("Settings saved");};
  const handleGex=g=>{setGex(g);saveGex(g);flash("GEX saved");};
  const handleImportTrades=(newEntries)=>{
    const arr=[...newEntries,...entries].sort((a,b)=>b.id-a.id);
    setEntries(arr);saveEntries(arr);setTab("home");setView("list");
    flash(`Imported ${newEntries.length} trade${newEntries.length!==1?"s":""}`);
  };
  const handleExport=()=>{const data={entries,watch,settings,exported:Date.now()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`stratos-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);flash("Journal exported");};
  const handleImport=(txt)=>{try{const d=JSON.parse(txt);
    if(d.entries){setEntries(d.entries);saveEntries(d.entries);}
    if(d.watch){setWatch(d.watch);saveWatch(d.watch);}
    if(d.settings){setSettings(d.settings);saveSettings(d.settings);}
    flash("Journal imported");}catch(_){flash("Import failed — invalid file");}};

  const filtered=filter==="ALL"?entries:entries.filter(e=>e.instrument===filter);
  const firedCount=watch.filter(w=>w.fired).length;

  const TABS=[{id:"home",label:"Journal",icon:"◧"},{id:"watch",label:"Watch",icon:"◉"},{id:"gex",label:"GEX",icon:"◢"},{id:"review",label:"Review",icon:"◈"},{id:"settings",label:"More",icon:"⚙"}];

  return(<div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:sans,maxWidth:760,margin:"0 auto",
    padding:"max(16px, env(safe-area-inset-top)) 14px calc(80px + env(safe-area-inset-bottom))"}}>

    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
      <div><div style={{fontFamily:mono,fontSize:"9px",color:C.amber,letterSpacing:"0.22em",marginBottom:5}}>◈ STRAT OS</div>
        <h1 style={{fontFamily:sans,fontWeight:700,fontSize:"21px",color:"#F3F6FA",letterSpacing:"-0.02em",lineHeight:1}}>
          {view==="form"?(isEdit?"Edit Brief":"New Brief"):view==="import"?"Import Trades":tab==="watch"?"Watchlist":tab==="gex"?"Today's GEX":tab==="review"?"Weekly Review":tab==="settings"?"Settings":"Trading Platform"}</h1></div>
      <div style={{textAlign:"right"}}>
        <div style={{fontFamily:mono,fontSize:"15px",color:C.muted}}>{clock.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}</div>
        <div style={{display:"flex",gap:5,alignItems:"center",justifyContent:"flex-end",marginTop:3}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:C.green,animation:"pulse 2s infinite"}}/>
          <span style={{fontFamily:mono,fontSize:"9px",color:`${C.green}55`}}>OFFLINE-READY</span></div></div>
    </div>

    {/* HOME */}
    {tab==="home"&&view==="list"&&(<div style={{animation:"fadeUp 0.3s ease both"}}>
      <StatsBar entries={entries}/>
      <DisciplinePanel breakers={settings.circuitBreakers} onGoToSettings={()=>setTab("settings")}/>
      <div style={{display:"flex",gap:7,marginBottom:16,flexWrap:"wrap"}}>
        <Pill color={C.amber} active={filter==="ALL"} onClick={()=>setFilter("ALL")}>ALL</Pill>
        {INSTRUMENTS.map(i=><Pill key={i.id} color={i.color} active={filter===i.id} onClick={()=>setFilter(i.id)}>{i.id}</Pill>)}</div>
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        <button onClick={startNew} style={{flex:1,padding:"15px",background:`linear-gradient(135deg, ${C.amber}, ${C.amber}CC)`,border:"none",borderRadius:"12px",
          color:"#0A0A0A",fontFamily:mono,fontWeight:700,fontSize:"13px",letterSpacing:"0.08em",cursor:"pointer",boxShadow:`0 4px 20px ${C.amber}33`}}>◈ NEW BRIEF</button>
        <button onClick={()=>{setView("import");}} style={{flex:"0 0 auto",padding:"15px 18px",background:"transparent",border:`1px solid ${C.blue}55`,borderRadius:"12px",
          color:C.blue,fontFamily:mono,fontWeight:700,fontSize:"12px",letterSpacing:"0.06em",cursor:"pointer"}}>↑ IMPORT CSV</button>
      </div>
      {filtered.length===0?(<div style={{textAlign:"center",padding:"50px 20px"}}>
        <div style={{fontFamily:mono,fontSize:"12px",color:C.muted,marginBottom:6}}>No entries yet</div>
        <div style={{fontFamily:sans,fontSize:"12px",color:C.dim}}>Start your first brief above. Everything you log is saved and compounds into your edge.</div></div>
      ):(<div style={{display:"flex",flexDirection:"column",gap:11}}>
        {filtered.map(e=><JournalCard key={e.id} entry={e} onOpen={openEntry} onDelete={handleDelete}/>)}</div>)}
    </div>)}

    {tab==="home"&&view==="form"&&editing&&(<div style={{animation:"fadeUp 0.3s ease both"}}>
      <EntryForm initial={editing} settings={settings} isEdit={isEdit} onSave={handleSave} onCancel={()=>{setView("list");setEditing(null);}}/></div>)}

    {/* IMPORT */}
    {view==="import"&&<ImportView onImportTrades={handleImportTrades} onClose={()=>{setView("list");setTab("home");}}/>}

    {/* WATCHLIST */}
    {tab==="watch"&&view!=="import"&&<WatchlistView watch={watch} onChange={handleWatch}/>}

    {/* GEX */}
    {tab==="gex"&&view!=="import"&&<GexView gex={gex} onSave={handleGex}/>}

    {/* REVIEW */}
    {tab==="review"&&view!=="import"&&<WeeklyReview entries={entries}/>}

    {/* SETTINGS */}
    {tab==="settings"&&view!=="import"&&<SettingsView settings={settings} onSave={handleSettings} onClose={()=>setTab("home")} onExport={handleExport} onImport={handleImport} onOpenImport={()=>setView("import")}/>}

    {/* Toast */}
    {toast&&(<div style={{position:"fixed",bottom:"calc(90px + env(safe-area-inset-bottom))",left:"50%",transform:"translateX(-50%)",
      background:C.panel2,border:`1px solid ${C.amber}55`,color:C.amber,fontFamily:mono,fontSize:"12px",padding:"10px 18px",
      borderRadius:"999px",zIndex:50,boxShadow:"0 8px 24px rgba(0,0,0,0.4)"}}>{toast}</div>)}

    {/* Bottom Tab Bar */}
    {view!=="form"&&(<div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:40,
      background:`${C.panel}F2`,borderTop:`1px solid ${C.border}`,backdropFilter:"blur(12px)",
      padding:"8px 12px calc(8px + env(safe-area-inset-bottom))",display:"flex",justifyContent:"space-around",maxWidth:760,margin:"0 auto"}}>
      {TABS.map(t=>(<button key={t.id} onClick={()=>{setTab(t.id);setView("list");}} style={{background:"transparent",border:"none",cursor:"pointer",
        display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 14px",position:"relative"}}>
        <span style={{fontSize:"18px",color:tab===t.id?C.amber:C.dim,lineHeight:1}}>{t.icon}</span>
        <span style={{fontFamily:mono,fontSize:"9px",letterSpacing:"0.04em",color:tab===t.id?C.amber:C.dim}}>{t.label}</span>
        {t.id==="watch"&&firedCount>0&&(<span style={{position:"absolute",top:0,right:6,width:14,height:14,borderRadius:"50%",
          background:C.red,color:"#fff",fontFamily:mono,fontSize:"8px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{firedCount}</span>)}
      </button>))}
    </div>)}
  </div>);}

/* ════ INLINE MANIFEST (no external file needed) ════ */
try{
  const manifest={
    name:"STRAT OS — Trading Platform",
    short_name:"STRAT OS",
    description:"The Strat · GEX · TFC · Battle Map · Journal · Watchlist",
    start_url:".",
    scope:".",
    display:"standalone",
    orientation:"portrait",
    background_color:"#08090C",
    theme_color:"#08090C",
    icons:[]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const link=document.createElement("link");
  link.rel="manifest"; link.href=url;
  document.head.appendChild(link);
}catch(_){}

/* ════ MOUNT ════ */
ReactDOM.createRoot(document.getElementById("root")).render(<StratOS/>);
if (window.__stratosBootTimer) clearTimeout(window.__stratosBootTimer);

/* Service worker only registers when served over http(s) — silently skipped
   when opened as a local file (file://), which still works perfectly fine
   without it since all data lives in localStorage. */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>{
    try{
      const swCode = `
        const CACHE="stratos-v1";
        self.addEventListener("install",e=>self.skipWaiting());
        self.addEventListener("activate",e=>self.clients.claim());
        self.addEventListener("fetch",e=>{});
      `;
      const swBlob=new Blob([swCode],{type:"application/javascript"});
      const swUrl=URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(()=>{});
    }catch(_){}
  });
}
</script>

<script>
  // Manual transform-and-execute: bypasses Babel's automatic type="text/babel"
  // page-scanner entirely (the source of the "appendChild / import statement"
  // crash seen with the auto-scan approach). We read our own source, hand it
  // to Babel.transform() directly, and execute the compiled output ourselves.
  (function () {
    function boot() {
      try {
        var srcEl = document.getElementById("app-source");
        var source = srcEl.textContent;
        var compiled = Babel.transform(source, {
          presets: [["react", { runtime: "classic" }]],
          sourceType: "script",
          filename: "stratos.jsx"
        }).code;
        var script = document.createElement("script");
        script.text = compiled;
        document.body.appendChild(script);
      } catch (err) {
        var root = document.getElementById("root");
        if (root) {
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;' +
            'background:#08090C;color:#E6EBF2;font-family:-apple-system,sans-serif;padding:32px;text-align:center;">' +
            '<div><div style="font-size:13px;letter-spacing:0.15em;color:#F5A623;margin-bottom:14px;">' +
            '\u25C8 STRAT OS COMPILE ERROR</div>' +
            '<div style="font-size:12px;color:#8B98AC;line-height:1.6;max-width:420px;white-space:pre-wrap;text-align:left;">' +
            (err && err.message ? err.message : String(err)) +
            '</div></div></div>';
        }
        console.error("STRAT OS compile error:", err);
      }
    }
    // Wait until React, ReactDOM, and Babel have all loaded from their CDN scripts.
    // 600 attempts x 50ms = up to 30 seconds — generous enough for slow connections
    // since babel.min.js in particular is a multi-megabyte file on first load.
    function waitForLibs(attempt) {
      attempt = attempt || 0;
      if (window.React && window.ReactDOM && window.Babel) {
        boot();
      } else if (attempt < 600) {
        setTimeout(function () { waitForLibs(attempt + 1); }, 50);
      } else {
        var missing = [];
        if (!window.React) missing.push("React");
        if (!window.ReactDOM) missing.push("ReactDOM");
        if (!window.Babel) missing.push("Babel");
        var root = document.getElementById("root");
        if (root) {
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;' +
            'background:#08090C;color:#E6EBF2;font-family:-apple-system,sans-serif;padding:32px;text-align:center;">' +
            '<div><div style="font-size:13px;letter-spacing:0.15em;color:#F5A623;margin-bottom:14px;">' +
            '\u25C8 STRAT OS COULD NOT LOAD</div>' +
            '<div style="font-size:13px;color:#8B98AC;line-height:1.6;max-width:360px;">' +
            'Still missing after 30 seconds: <b style="color:#E5484D;">' + missing.join(", ") + '</b>. ' +
            'This usually means a slow or interrupted connection to unpkg.com. Check your internet ' +
            'and reload.</div>' +
            '<div style="margin-top:18px;"><button onclick="location.reload()" style="background:#F5A623;' +
            'color:#0A0A0A;border:none;border-radius:8px;padding:10px 20px;font-weight:700;' +
            'font-family:monospace;font-size:12px;cursor:pointer;">RELOAD</button></div></div></div>';
        }
      }
    }
    // Show a lightweight "loading" indicator immediately so the screen never
    // looks frozen/blank while libraries are still downloading.
    (function showLoading(){
      var root = document.getElementById("root");
      if (root && root.children.length === 0) {
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;' +
          'background:#08090C;color:#566173;font-family:monospace;font-size:11px;letter-spacing:0.1em;">' +
          '\u25C8 LOADING STRAT OS\u2026</div>';
      }
    })();
    waitForLibs();
  })();
</script>
